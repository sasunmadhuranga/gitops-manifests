apiVersion: v1
kind: Service
metadata:
  name: gitops-app-svc
  namespace: gitops-app
  labels:
    app: gitops-app
spec:
  # ClusterIP means the service is only reachable inside the cluster.
  # The ALB (Ingress) is what exposes it to the internet — not this service directly.
  type: ClusterIP
  selector:
    app: gitops-app
  ports:
    - name: http
      protocol: TCP
      port: 80          # Port the ALB talks to the Service on
      targetPort: 8000  # Port your container listens on
