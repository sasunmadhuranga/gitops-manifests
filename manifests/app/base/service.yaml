apiVersion: v1
kind: Service
metadata:
  name: gitops-app-svc
  namespace: gitops-app
  labels:
    app: gitops-app
spec:
  type: ClusterIP
  selector:
    app: gitops-app
  ports:
    - name: http
      protocol: TCP
      port: 80          # Port the ALB talks to the Service on
      targetPort: 8000  # Port container listens on
