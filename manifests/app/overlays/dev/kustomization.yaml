apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

# GitHub Actions updates ONLY this line on every push.
# The value below is a placeholder — it will be replaced by CI on first deploy.
images:
  - name: ............dkr.ecr.us-east-1.amazonaws.com/gitops-argocd-dev-gitops-app
    newName: ............dkr.ecr.us-east-1.amazonaws.com/gitops-argocd-dev-gitops-app  
    newTag: latest                        # GitHub Actions replaces this with sha-<commit>

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gitops-app
        namespace: gitops-app
      spec:
        replicas: 1
